<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jasodev - Sitio en Desarrollo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .container {
            max-width: 800px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
        }
        
        .logo {
            margin-bottom: 20px;
        }
        
        .logo h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fdbb2d, #b21f1f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }
        
        .logo span {
            color: #fdbb2d;
        }
        
        .message h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #fdbb2d;
        }
        
        .message p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;
            color: #f4f4f4;
        }
        
        .progress-container {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 30px 0;
            overflow: hidden;
        }
        
        .progress-bar {
            height: 100%;
            width: 65%;
            background: linear-gradient(to right, #fdbb2d, #b21f1f);
            border-radius: 10px;
            animation: progressAnimation 3s ease-in-out infinite;
        }
        
        @keyframes progressAnimation {
            0% { width: 65%; }
            50% { width: 75%; }
            100% { width: 65%; }
        }
        
        .contact-info {
            margin: 25px 0;
        }
        
        .contact-info p {
            margin: 10px 0;
            font-size: 1.1rem;
        }
        
        .contact-info i {
            color: #fdbb2d;
            margin-right: 10px;
        }
        
        .social-links {
            margin-top: 30px;
        }
        
        .social-links a {
            display: inline-block;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.1);
            margin: 0 10px;
            border-radius: 50%;
            color: #fdbb2d;
            font-size: 1.5rem;
            line-height: 45px;
            text-align: center;
            transition: all 0.3s ease;
        }
        
        .social-links a:hover {
            transform: translateY(-5px);
            background: #fdbb2d;
            color: #1a2a6c;
        }
        
        .countdown {
            margin: 25px 0;
            font-size: 1.3rem;
        }
        
        .countdown span {
            font-weight: bold;
            color: #fdbb2d;
        }
        
        @media (max-width: 768px) {
            .container {
                width: 90%;
                padding: 20px;
            }
            
            .logo h1 {
                font-size: 2.5rem;
            }
            
            .message h2 {
                font-size: 1.5rem;
            }
            
            .message p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>JASO<span>DEV</span></h1>
        </div>
        
        <div class="message">
            <h2><i class="fas fa-tools"></i> Sitio Web en Desarrollo</h2>
            <p>Estamos trabajando duro para crear algo increíble. Muy pronto tendremos nuestro sitio web listo con contenido innovador y soluciones tecnológicas de vanguardia.</p>
        </div>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        
        <div class="countdown">
            <p>Lanzamiento estimado: <span>30 días</span></p>
        </div>
        
        <div class="contact-info">
            <p><i class="fas fa-envelope"></i> info@jasodev.es</p>
            <p><i class="fas fa-phone"></i> +34 123 456 789</p>
            <p><i class="fas fa-map-marker-alt"></i> Madrid, España</p>
        </div>
        
        <div class="social-links">
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-linkedin"></i></a>
            <a href="#"><i class="fab fa-github"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

    <script>
        // Efecto de partículas de fondo
        document.addEventListener('DOMContentLoaded', function() {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100%';
            canvas.style.height = '100%';
            canvas.style.zIndex = '-1';
            document.body.appendChild(canvas);
            
            const particles = [];
            const particleCount = 100;
            
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            
            window.addEventListener('resize', resizeCanvas);
            resizeCanvas();
            
            // Crear partículas
            for (let i = 0; i < particleCount; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 3 + 1,
                    speed: Math.random() * 2 + 0.5,
                    direction: Math.random() * 360,
                    color: `rgba(253, 187, 45, ${Math.random() * 0.5})`
                });
            }
            
            function drawParticles() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                particles.forEach(particle => {
                    ctx.beginPath();
                    ctx.arc(particle.x, particle.y, particle.radius, 0, Math.PI * 2);
                    ctx.fillStyle = particle.color;
                    ctx.fill();
                    
                    // Mover partícula
                    particle.x += Math.cos(particle.direction) * particle.speed;
                    particle.y += Math.sin(particle.direction) * particle.speed;
                    
                    // Rebotar en los bordes
                    if (particle.x < 0 || particle.x > canvas.width) {
                        particle.direction = Math.PI - particle.direction;
                    }
                    if (particle.y < 0 || particle.y > canvas.height) {
                        particle.direction = -particle.direction;
                    }
                });
                
                requestAnimationFrame(drawParticles);
            }
            
            drawParticles();
        });
    </script>
</body>
</html>
