<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {},
            },
            plugins: [],
        }
    </script>
</head>
<body class="m-2 dark:bg-neutral-900 bg-white">
    <code class="example">
        <main>
            <header>
                <h1>Formulario</h1>
            </header>
            <form action="">
                <section>
                    <label for="user">Label 1</label>
                    <input type="text" name="user" />
                    <label for="password">Label 2</label>
                    <input type="password" name="password" />
                    <button type="submit">Button</button>
                </section>
                <footer>
                    <label for="conected">
                        <input type="checkbox" id="checkbox" name="checkbox" />
                        Checkbox
                    </label>
                    <label for="radio">
                        <input type="radio" id="radio" name="radio" />
                        Radio1
                    </label>
                    <label for="radio">
                        <input type="radio" id="radio1" name="radio" />
                        Radio2
                    </label>
                    <select name="d" id="d">
                        <option value="1">Lorem</option>
                        <option value="2">Lorem</option>
                        <option value="3">Lorem</option>
                    </select>
                </footer>
            </form>
        </main>
    </code>
    <article class="flex flex-col flex-1 w-full mt-8">
        <pre id="editor-container" style="height: 100vh; width: 100%;"></pre>
    </article>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.43.0/min/vs/loader.js"></script>
    <script>
        const html_theme = document.querySelector('html')
        const body = document.querySelector('body')
        const main = document.querySelectorAll('main')
        const h1 = document.querySelectorAll('h1')
        const form = document.querySelectorAll('form')
        const button = document.querySelectorAll('button')
        const input = document.querySelectorAll('input')
        const label = document.querySelectorAll('label')
        const select = document.querySelectorAll('select')
        const checkbox = document.querySelectorAll('#checkbox')
        const radio = document.querySelectorAll('input[type="radio"]')
        const section = document.querySelectorAll('section')
        const footer = document.querySelectorAll('footer')
        const header = document.querySelectorAll('header')
        const code = document.querySelector('.code')
        const example = document.querySelector('.example')

        
        function addClass(elementHtml) {
            let nameElement = ''
            for (let opt of elementHtml) {
                opt.type === 'text' ? nameElement = 'input' : nameElement = opt.localName
                opt.type === 'password' ? nameElement = 'input' : nameElement = opt.localName
                opt.type === 'checkbox' ? nameElement = 'checkbox' : nameElement = opt.localName
                opt.type === 'radio' ? nameElement = 'radio' : nameElement = opt.localName
                opt.classList = localStorage.getItem(nameElement)
            }
        }
        localStorage.getItem('h1') ? addClass(h1) : ''
        localStorage.getItem('main') ? addClass(main) : ''
        localStorage.getItem('form') ? addClass(form) : ''
        localStorage.getItem('button') ? addClass(button) : ''
        localStorage.getItem('input') ? addClass(input) : ''
        localStorage.getItem('label') ? addClass(label) : ''
        localStorage.getItem('select') ? addClass(select) : ''
        checkbox[0].classList = localStorage.getItem('checkbox')
        localStorage.getItem('radio') ? addClass(radio) : ''
        localStorage.getItem('section') ? addClass(section) : ''
        localStorage.getItem('footer') ? addClass(footer) : ''
        localStorage.getItem('header') ? addClass(header) : ''
        
        if(localStorage.getItem('theme') === 'light') {
            html_theme.classList.add('light')
            body.classList.add('light')
            html_theme.classList.remove('dark')
            body.classList.remove('dark')
        } else{
            html_theme.classList.add('dark')
            body.classList.add('dark')
            html_theme.classList.remove('light')
            body.classList.remove('light')
        } 

    require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.43.0/min/vs' } });

    require(['vs/editor/editor.main'], function () {
      monaco.editor.create(document.getElementById('editor-container'), {
        value: [
          example.innerHTML
        ].join('\n'),
        language: 'html',
        theme: 'vs-dark'
      });
    });

    </script>
</body>
</html>
