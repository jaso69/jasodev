<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {},
            },
            plugins: [],
        }
    </script>
</head>
<body class="m-2 dark:bg-neutral-900 bg-white">
    <code class="example">
        <nav>
            <div>
                <span>Logo</span>
            </div>
            <section>
                <ul>
                    <li>
                        <a href="#">Inicio</a>
                    </li>
                    <li>
                        <a href="#">Sobre nosotros</a>
                    </li>
                    <li>
                        <a href="#">Contacto</a>
                    </li>
                    <li>
                        <a href="#">Blog</a>
                    </li>
                    <li>
                        <select name="d" id="d">
                            <option value="1">Lorem</option>
                            <option value="2">Lorem</option>
                            <option value="3">Lorem</option>
                        </select>
                    </li>
                    <li>
                        <a href="#">Portfolio</a>
                    </li>
                    <li>
                        <a href="#">Servicios</a>
                    </li>
                    <li>
                        <button>Log in</button>
                    </li>
                </ul>
            </section>
            
        </nav>
    </code>
    <pre id="editor-container" style="height: 100vh; width: 100%;"></pre>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.43.0/min/vs/loader.js"></script>
    <script>
        const html_theme = document.querySelector('html')
        const body = document.querySelector('body')
        const div = document.querySelectorAll('div')
        const nav = document.querySelectorAll('nav')
        const span = document.querySelectorAll('span')
        const button = document.querySelectorAll('button')
        const section = document.querySelectorAll('section')
        const a = document.querySelectorAll('a')
        const select = document.querySelectorAll('select')
        const ul = document.querySelectorAll('ul')
        const li = document.querySelectorAll('li')
        const code = document.querySelector('.code')
        const example = document.querySelector('.example')
        
        const elementoHtml = localStorage.getItem('elementoHtml')
        
        function addClass( elementHtml) {
            const claseFull = localStorage.getItem(elementoHtml)
            if(JSON.parse(claseFull) === null) return
            const clase = JSON.parse(claseFull)
            console.log(typeof clase)
                
        }
        
        if(elementoHtml === 'span')  { addClass(span) }
        if(elementoHtml === 'div')  { addClass(div) }
        if(elementoHtml === 'nav')  { addClass(nav) }
        if(elementoHtml === 'button')  { addClass(button) }
        if(elementoHtml === 'a')  { addClass(a) }
        if(elementoHtml === 'ul')  { addClass(ul) }
        if(elementoHtml === 'select')  { addClass(select) }
        if(elementoHtml === 'li')  { addClass(li) }
        if(elementoHtml === 'section')  { addClass(section) }
        
        if(localStorage.getItem('theme') === 'light') {
            html_theme.classList.add('light')
            body.classList.add('light')
            html_theme.classList.remove('dark')
            body.classList.remove('dark')
        } else{
            html_theme.classList.add('dark')
            body.classList.add('dark')
            html_theme.classList.remove('light')
            body.classList.remove('light')
        } 

    require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.43.0/min/vs' } });

    require(['vs/editor/editor.main'], function () {
      monaco.editor.create(document.getElementById('editor-container'), {
        value: [
          example.innerHTML
        ].join('\n'),
        language: 'html',
        theme: 'vs-dark'
      });
    });

    </script>
</body>
</html>
