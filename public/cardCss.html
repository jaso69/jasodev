<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css</title>
    <link href="https://cdn.jsdelivr.net/npm/flowbite@2.5.2/dist/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {},
            },
            plugins: [],
        }
    </script>
</head>
<body class="m-2 dark:bg-neutral-900 bg-white">
    <code class="example">
        <main>
            <img src="./card.jpg" alt="card">
            <section>
                <h5>Card title</h5>
                <p>Some quick example text to build on the card title and make up the bulk of the card's content.</p>
                <footer>
                    <button>Card button</button>
                    <a href="#">Another link</a>
                </footer>
            </section>
        </main>
    </code>
    <pre id="editor-container" style="height: 100vh; width: 100%;"></pre>

    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.43.0/min/vs/loader.js"></script>
    <script>
        const html_theme = document.querySelector('html')
        const body = document.querySelector('body')
        const main = document.querySelectorAll('main')
        const img = document.querySelectorAll('img')
        const h5 = document.querySelectorAll('h5')
        const section = document.querySelectorAll('section')
        const a = document.querySelectorAll('a')
        const p = document.querySelectorAll('p')
        const footer = document.querySelectorAll('footer')
        const button = document.querySelectorAll('button')
        const code = document.querySelector('.code')
        const example = document.querySelector('.example')

        function addClass(elementHtml) {
            let nameElement = ''
            for (let opt of elementHtml) {
                nameElement = opt.localName
                opt.classList = localStorage.getItem(nameElement)
            }
        }
        localStorage.getItem('img') ? addClass(img) : ''
        localStorage.getItem('main') ? addClass(main) : ''
        localStorage.getItem('h5') ? addClass(h5) : ''
        localStorage.getItem('button') ? addClass(button) : ''
        localStorage.getItem('a') ? addClass(a) : ''
        localStorage.getItem('p') ? addClass(p) : ''
        localStorage.getItem('section') ? addClass(section) : ''
        localStorage.getItem('footer') ? addClass(footer) : ''
        
        if(localStorage.getItem('theme') === 'light') {
            html_theme.classList.add('light')
            body.classList.add('light')
            html_theme.classList.remove('dark')
            body.classList.remove('dark')
        } else{
            html_theme.classList.add('dark')
            body.classList.add('dark')
            html_theme.classList.remove('light')
            body.classList.remove('light')
        } 

    require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor@0.43.0/min/vs' } });

    require(['vs/editor/editor.main'], function () {
      monaco.editor.create(document.getElementById('editor-container'), {
        value: [
          example.innerHTML
        ].join('\n'),
        language: 'html',
        theme: 'vs-dark'
      });
    });

    </script>
</body>
</html>
